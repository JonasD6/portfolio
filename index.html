<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-[#E6E89C] text-black font-sans min-h-screen flex flex-col">

  <!-- NAV -->
  <nav class="bg-black text-white">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4 nav-inner">

      <h1 class="font-bold">Mijn Portfolio</h1>

      <div class="flex items-center gap-6 nav-controls">

        <div class="space-x-6 nav-links">
          <a href="index.html" data-translate="nav.home">Home</a>
          <a href="about.html" data-translate="nav.about">Over mij</a>
          <a href="projects.html" data-translate="nav.projects">Projecten</a>
        </div>

        <button class="language-toggle" id="langToggle">
          <span id="langText">NL</span>
        </button>

        <label class="theme-switch" for="themeToggle">
          <input type="checkbox" id="themeToggle">
          <span class="slider">
            <i id="themeIcon" class="theme-icon fas fa-sun"></i>
          </span>
        </label>

      </div>
    </div>
  </nav>

  <main class="flex-grow">

    <!-- HERO -->
    <section class="bg-[#D6DB7C] panel-primary py-14 md:py-20">
      <div class="max-w-6xl mx-auto px-6 text-center">

        <img src="assets/profile.jpg"
          class="w-40 h-40 object-cover rounded-full border-4 border-white shadow mx-auto mb-6">

        <h1 class="text-4xl font-bold mb-6" data-translate="index.title">
          Welkom op mijn E-Portfolio
        </h1>

        <p class="max-w-2xl mx-auto mb-6" data-translate="index.subtitle">
          Dit is mijn persoonlijke portfolio waar ik mijn projecten voorstel.
        </p>

        <a href="about.html"
          class="px-6 py-3 bg-black text-white rounded-full"
          data-translate="index.cta">
          Ontdek meer
        </a>

      </div>
    </section>

    <!-- PROJECT CAROUSEL -->
    <section class="py-14 md:py-20 pb-20 bg-[#E6E89C] panel-secondary">
      <div class="max-w-6xl mx-auto px-6 text-center">

        <h2 class="text-3xl font-bold mb-10" data-translate="index.projects.title">
          Mijn favoriete projecten
        </h2>

        <div class="relative flex items-center justify-center">

          <button onclick="prevProject()" class="absolute left-0 text-4xl px-4">‹</button>

          <!-- PROJECT CARD -->
          <div id="projectCard"
            class="p-6 rounded shadow w-full max-w-xl transition duration-300">

            <i id="projectIcon" class="text-3xl mb-4"></i>

            <h3 id="projectTitle" class="font-bold text-xl mb-2"></h3>

            <div id="projectCounter" class="text-sm text-gray-600 mb-2"></div>

            <p id="projectDesc" class="text-gray-700 mb-4"></p>

          </div>

          <button onclick="nextProject()" class="absolute right-0 text-4xl px-4">›</button>

        </div>

        <div class="mt-10">
          <a href="projects.html"
            class="px-6 py-3 bg-black text-white rounded-full hover:bg-white hover:text-black transition"
            data-translate="index.projects.button">
            Bekijk alle projecten
          </a>
        </div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="bg-black text-white py-6">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center footer-inner">

      <p data-translate="footer.copyright">© 2026 Jonas Duerinck</p>

      <div class="flex gap-4 text-xl">
        <a href="https://github.com/JonasD6" target="_blank" class="hover:text-yellow-400 transition">
          <i class="fab fa-github"></i>
        </a>
        <a href="https://www.linkedin.com/in/jonas-duerinck-3267ba331/" target="_blank" class="hover:text-yellow-400 transition">
          <i class="fab fa-linkedin"></i>
        </a>
      </div>

    </div>
  </footer>

  <!-- SCRIPTS: theme eerst, dan language, dan de rest -->
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/language.js"></script>
  <script src="assets/js/cursor.js"></script>
  <script src="assets/js/chatbot.js"></script>

  <!-- PROJECT CAROUSEL -->
  <script>
    const projects = [
      { icon: "fas fa-shirt",    titleKey: "index.project1.title", descKey: "index.project1.desc" },
      { icon: "fas fa-brain",    titleKey: "index.project2.title", descKey: "index.project2.desc" },
      { icon: "fas fa-box",      titleKey: "index.project3.title", descKey: "index.project3.desc" },
      { icon: "fas fa-users",    titleKey: "index.project4.title", descKey: "index.project4.desc" },
      { icon: "fas fa-utensils", titleKey: "index.project5.title", descKey: "index.project5.desc" }
    ];

    let current = 0;

    function applyThemeToCard() {
      const card = document.getElementById("projectCard");
      const counter = document.getElementById("projectCounter");
      const desc = document.getElementById("projectDesc");
      const isDark = document.body.classList.contains("theme-dark");

      if (isDark) {
        card.style.backgroundColor = "#3a4e78";
        card.style.color = "white";
        if (counter) counter.style.color = "#cbd5e1";
        if (desc) desc.style.color = "#cbd5e1";
      } else {
        card.style.backgroundColor = "#D6DB7C";
        card.style.color = "black";
        if (counter) counter.style.color = "#4b5563";
        if (desc) desc.style.color = "#374151";
      }
    }

    function renderProject() {
      const p = projects[current];
      document.getElementById("projectIcon").className = p.icon + " text-3xl mb-4";
      document.getElementById("projectTitle").innerText = languageSystem.get(p.titleKey);
      document.getElementById("projectDesc").innerText = languageSystem.get(p.descKey);
      document.getElementById("projectCounter").innerText = (current + 1) + " / " + projects.length;
      applyThemeToCard();
    }

    function nextProject() {
      current = (current + 1) % projects.length;
      renderProject();
    }

    function prevProject() {
      current = (current - 1 + projects.length) % projects.length;
      renderProject();
    }

    document.addEventListener("DOMContentLoaded", renderProject);

    // Herrender kaart bij taalwissel
    window.addEventListener("languageChanged", renderProject);

    // Herrender kaart bij thema-wissel
    document.getElementById("themeToggle").addEventListener("change", function () {
      setTimeout(applyThemeToCard, 50);
    });
  </script>

</body>
</html>
